<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15 Anos Alice</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP para animação de abertura -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        
        body {
            background-color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Playfair Display', serif;
        }

        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 100%;
            height: 100vh;
        }

        .intro-container {
            width: 100%;
            height: 100%;
            max-width: 1080px;
            position: relative;
            overflow: hidden;
        }

        .main-content {
            max-width: 1080px;
            margin: 0 auto;
            background-color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: none;
        }

        .btn-maps {
            background-color: #8c0000;
            transition: all 0.3s ease;
        }

        .btn-maps:hover {
            background-color: #6b0000;
            transform: scale(1.05);
        }

        .btn-maps:active {
            transform: scale(0.95);
        }

        /* Filtro de distorção para a máscara */
        .displacement-filter {
            filter: url(#displacementFilter);
        }

        svg {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- INTRO SCREEN -->
    <div id="intro-screen" onclick="startReveal()">
        <div class="intro-container">
            <svg viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <filter id="displacementFilter">
                        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="80" xChannelSelector="R" yChannelSelector="G" />
                    </filter>
                    <mask id="circleMask">
                        <circle id="reveal-circle" cx="540" cy="960" r="0" fill="white" class="displacement-filter" />
                    </mask>
                </defs>
                <image xlink:href="01.png" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" mask="url(#circleMask)" />
            </svg>

            <!-- Overlay de Clique -->
            <div id="click-overlay" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-white/10 backdrop-blur-[2px]">
                <div class="bg-white/80 px-8 py-4 rounded-full shadow-xl border border-amber-100 text-center">
                    <h2 class="text-gray-800 text-lg md:text-2xl tracking-[0.2em] uppercase">
                        Clique para abrir
                    </h2>
                    <div class="mt-2 text-amber-600 font-bold animate-bounce">
                        ↓
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="main-content" class="main-content">
        <!-- SEÇÃO 1 -->
        <section class="w-full leading-[0]">
            <img src="01.png" alt="Convite Parte 1" class="w-full h-auto block">
        </section>

        <!-- SEÇÃO 2 -->
        <section class="w-full relative leading-[0]">
            <img src="02.png" alt="Convite Parte 2" class="w-full h-auto block">
            
            <!-- Localização Sobreposta -->
            <div class="absolute left-0 right-0 flex flex-col items-center px-6 space-y-4 md:space-y-6" style="top: 47%">
                <div class="w-full max-w-[220px] sm:max-w-[280px] md:max-w-md overflow-hidden rounded-2xl shadow-2xl border-2 md:border-4 border-white">
                    <img src="local.png" alt="Mapa do Local" class="w-full h-auto block">
                </div>
                
                <button onclick="openMaps()" class="btn-maps text-white px-6 py-4 md:px-10 md:py-7 rounded-full text-sm md:text-lg font-semibold shadow-2xl flex items-center gap-2 md:gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-6 md:h-6"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    ABRIR NO MAPS
                </button>
            </div>
        </section>

        <div class="h-10 bg-white"></div>
    </main>

    <script>
        function startReveal() {
            const overlay = document.getElementById('click-overlay');
            const circle = document.getElementById('reveal-circle');
            const intro = document.getElementById('intro-screen');
            const main = document.getElementById('main-content');

            if (overlay.style.display === 'none') return;

            overlay.style.display = 'none';
            
            // Mostra o conteúdo principal imediatamente por baixo para permitir scroll antecipado
            main.style.display = 'block';

            // Animação de 2.5 segundos
            gsap.to(circle, {
                attr: { r: 2000 },
                duration: 2.5,
                ease: "power2.inOut",
                onComplete: () => {
                    intro.style.display = 'none';
                }
            });

            // Libera o scroll 1 segundo antes do fim da animação (aos 1.5s)
            setTimeout(() => {
                document.body.style.overflow = 'auto';
            }, 1500);
        }

        function openMaps() {
            window.open("https://www.google.com/maps/place/Festa+%26+Cia/@-11.431244,-40.5952361,20.5z/data=!4m14!1m7!3m6!1s0x76c87f74c2b9e31:0x169bcdfbf412f3cc!2sDoce+Vida+Bomboniere+e+festa!8m2!3d-11.4313673!4d-40.5953833!16s%2Fg%2F11jtvs1p2y!3m5!1s0x76c8785d78207ed:0x53d178a0482b1df3!8m2!3d-11.4312495!4d-40.5953558!16s%2Fg%2F11h32_b877?entry=ttu&g_ep=EgoyMDI2MDMwOC4wIKXMDSoASAFQAw%3D%3D", "_blank");
        }

        document.body.style.overflow = 'hidden';
    </script>
</body>
</html>
